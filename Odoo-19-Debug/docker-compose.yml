version: '3.8'

services:
  myDB19:
    image: postgres:15
    container_name: odoo19-db-test
    restart: always
    ports:
      - "5434:5432"
    environment:
      # AQUÍ TUS DATOS DE DB
      POSTGRES_USER: chrizzzadmin
      POSTGRES_PASSWORD: "051002"
      POSTGRES_DB: postgres
    volumes:
      - ./postgres19_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chrizzzadmin -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  odoo:
    image: odoo:19.0
    container_name: odoo19-server-test
    restart: always
    depends_on:
      myDB19:
        condition: service_healthy
    environment:
      - HOST=myDB19
      - USER=chrizzzadmin
      - PASSWORD=051002
    ports:
      - "8071:8069"
    volumes:
      - ./addons_custom:/mnt/extra-addons
      - ../Odoo-priv:/mnt/odoo-priv
      - ../tutorials:/mnt/tutorials
      - ../Debug_Module:/mnt/Debug_Module
      - ../config/odoo_test.conf:/etc/odoo/odoo.conf
      - ./odoo_data:/var/lib/odoo

  pdAdmin:
    image: dpage/pgadmin4
    container_name: pgadmin4-v19-test
    restart: always
    depends_on:
      - myDB19
    ports:
      - "8083:80"
    environment:
      # Estos son solo para entrar al panel web de pgAdmin
      PGADMIN_DEFAULT_EMAIL: criz-Odoo_test@gmail.com
      PGADMIN_DEFAULT_PASSWORD: "051002"
    volumes:
      - ./pgadmin19_data:/var/lib/pgadmin